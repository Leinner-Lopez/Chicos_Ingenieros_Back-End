services:
  db:
    image: mysql:8.0
    container_name: zenkai-db
    environment:
      - MYSQL_DATABASE=Zenkai
      - MYSQL_ROOT_PASSWORD=Herley1234
    ports:
      - "3306:3306"
    healthcheck: # Esto asegura que la DB esté lista antes que el backend
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    container_name: zenkai-api
    ports:
      - "8080:8080"
    env_file:
      - .env.template
    depends_on:
      db:
        condition: service_healthy