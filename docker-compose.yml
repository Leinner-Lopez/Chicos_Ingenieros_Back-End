services:
  db:
    image: mysql:8.0
    container_name: zenkai-db
    environment:
      - MYSQL_DATABASE=Zenkai
      - MYSQL_ROOT_PASSWORD=Herley1234
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    container_name: zenkai-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ../Chicos_Ingenieros_Front-End
    container_name: zenkai-web
    ports:
      - "4200:4000"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8080