services:
  db:
    image: mysql:8.0
    container_name: zenkai-db
    environment:
      - MYSQL_DATABASE=Zenkai
      - MYSQL_ROOT_PASSWORD=Herley1234
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zenkai-network

  backend:
    build: .
    container_name: zenkai-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - zenkai-network

  frontend:
    build: ../Chicos_Ingenieros_Front-End
    container_name: zenkai-web
    ports:
      - "4200:4000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_URL=http://backend:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zenkai-network
networks:
  zenkai-network:
    driver: bridge